name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      # Step 3: Clean install dependencies and fix native bindings
      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps
          npm install @tailwindcss/oxide-linux-x64-gnu 
          npm rebuild esbuild
        working-directory: ./

      # Step 4: Build Vite Project
      - name: Build Vite Project
        run: npm run build
        working-directory: ./
        env:
          NODE_OPTIONS: "--no-experimental-fetch"

      # Step 5: Install Capacitor and setup Android
      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          if [ ! -d "android" ]; then
            npx cap init Frida com.saidmera.frida --web-dir=dist
            npx cap add android
          fi
          npx cap sync android
        working-directory: ./

      # Step 6: Setup JDK
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Step 7: Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        working-directory: ./

      # Step 8: Upload APK as artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
