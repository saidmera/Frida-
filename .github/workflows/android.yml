name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps
          # Force install specific dependencies causing issues in Linux runners
          npm install motion @tailwindcss/oxide-linux-x64-gnu
          npm rebuild esbuild

      - name: Build Vite Project
        run: npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Capacitor & Sync Android
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # Initialize only if 'android' folder is missing from your repo
          if [ ! -d "android" ]; then
            npx cap init Frida com.saidmera.frida --web-dir=dist
            npx cap add android
          fi
          npx cap sync android

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Frida-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
